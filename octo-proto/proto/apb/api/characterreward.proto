syntax = "proto3";

package apb.api;

// CharacterRewardService handles character-specific gacha/lottery rewards.

service CharacterRewardService {
  rpc GetCharacterRewards(GetCharacterRewardsRequest) returns (GetCharacterRewardsResponse);
  rpc ClaimCharacterReward(ClaimCharacterRewardRequest) returns (ClaimCharacterRewardResponse);
}

// Request/response messages

message GetCharacterRewardsRequest {
  string uuid = 1;
  int32 character_id = 2;
}

message GetCharacterRewardsResponse {
  repeated CharacterRewardData rewards = 1;
  int32 remaining_draws = 2;
}

message ClaimCharacterRewardRequest {
  string uuid = 1;
  int32 character_id = 2;
  int32 reward_tier = 3; // which tier of reward to claim
}

message ClaimCharacterRewardResponse {
  bool success = 1;
  repeated RewardItem claimed_items = 2;
  int32 remaining_draws = 3;
}

// Domain messages

message CharacterRewardData {
  int32 character_id = 1;
  int32 reward_pool_id = 2;
  repeated CharacterRewardTier tiers = 3;
  int64 reset_time = 4;
}

message CharacterRewardTier {
  int32 tier_id = 1;
  string tier_name = 2;
  bool is_claimed = 3;
  bool is_available = 4;
  int32 cost_per_draw = 5;
  repeated RewardItem possible_items = 6;
}
