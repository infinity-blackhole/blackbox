syntax = "proto3";

package apb.api;

// Diff data types for incremental state sync (Approach C).

message DiffEntry {
  string table_name = 1;
  string key_field = 2;
  string key_value = 3;
  string field_name = 4;
  string old_value = 5;
  string new_value = 6;
  DiffAction action = 7;
}

enum DiffAction {
  DIFF_ACTION_INSERT = 0;
  DIFF_ACTION_UPDATE = 1;
  DIFF_ACTION_DELETE = 2;
}

message DiffData {
  repeated DiffEntry entries = 1;
}

message DiffSyncPacket {
  map<string, DiffData> tables = 1;
}
