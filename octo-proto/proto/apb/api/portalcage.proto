syntax = "proto3";

package apb.api;

// PortalCageService handles portal cage mechanics (gacha/portal interactions).

service PortalCageService {
  rpc GetPortalCage(GetPortalCageRequest) returns (GetPortalCageResponse);
  rpc OpenPortalCage(OpenPortalCageRequest) returns (OpenPortalCageResponse);
}

message GetPortalCageRequest {
  string uuid = 1;
  string cage_id = 2;
}

message GetPortalCageResponse {
  PortalCageData cage = 1;
  repeated CageReward available_rewards = 2;
  int32 remaining_opens = 3;
}

message OpenPortalCageRequest {
  string uuid = 1;
  string cage_id = 2;
  int32 open_count = 3;
}

message OpenPortalCageResponse {
  bool success = 1;
  repeated CageReward rewards = 2;
  string error_message = 3;
}

message PortalCageData {
  string cage_id = 1;
  string name = 2;
  int32 max_opens = 3;
  int32 current_opens = 4;
  int64 reset_time = 5;
  bool is_active = 6;
}

message CageReward {
  string item_id = 1;
  string item_name = 2;
  int32 quantity = 3;
  int32 rarity = 4;
}
