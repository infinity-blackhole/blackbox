syntax = "proto3";

package apb.api;

import "apb/api/data.proto";

// GimmickService handles interactive world gimmicks and triggers.
service GimmickService {
  rpc GetGimmick(GetGimmickRequest) returns (GetGimmickResponse);
  rpc TriggerGimmick(TriggerGimmickRequest) returns (TriggerGimmickResponse);
}

// Request to get gimmick state.
message GetGimmickRequest {
  string gimmick_id = 1;
}

// Response with gimmick details.
message GetGimmickResponse {
  GimmickData gimmick = 1;
}

// Request to trigger a gimmick.
message TriggerGimmickRequest {
  string gimmick_id = 1;
  string uuid = 2;
}

// Response after triggering a gimmick.
message TriggerGimmickResponse {
  bool success = 1;
  string gimmick_id = 2;
  repeated Reward rewards = 3;
  repeated DiffEntry diffs = 4;
}

// Gimmick data representation.
message GimmickData {
  string gimmick_id = 1;
  string name = 2;
  string type = 3;
  bool activated = 4;
  int32 cooldown = 5;
  int64 last_activated_time = 6;
}

// Reward from triggering a gimmick.
message Reward {
  string item_id = 1;
  int32 quantity = 2;
}
