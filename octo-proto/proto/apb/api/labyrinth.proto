syntax = "proto3";

package apb.api;

// LabyrinthService handles labyrinth dungeon runs.

service LabyrinthService {
  rpc GetLabyrinth(GetLabyrinthRequest) returns (GetLabyrinthResponse);
  rpc StartLabyrinth(StartLabyrinthRequest) returns (StartLabyrinthResponse);
  rpc EndLabyrinth(EndLabyrinthRequest) returns (EndLabyrinthResponse);
}

// Request/response messages

message GetLabyrinthRequest {
  string uuid = 1;
}

message GetLabyrinthResponse {
  repeated LabyrinthFloor floors = 1;
  int32 current_floor = 2;
  int32 max_floor_reached = 3;
}

message StartLabyrinthRequest {
  string uuid = 1;
  int32 floor_number = 2;
  repeated int32 character_ids = 3;
}

message StartLabyrinthResponse {
  string labyrinth_session_id = 1;
  int32 floor_number = 2;
  int64 start_time = 3;
}

message EndLabyrinthRequest {
  string uuid = 1;
  string labyrinth_session_id = 2;
  bool is_cleared = 3;
  int32 steps_taken = 4;
}

message EndLabyrinthResponse {
  bool success = 1;
  bool is_cleared = 2;
  repeated RewardItem rewards = 3;
  int32 score = 4;
}

// Domain messages

message LabyrinthFloor {
  int32 floor_number = 1;
  string floor_name = 2;
  int32 difficulty = 3;
  bool is_cleared = 4;
  int32 recommended_power = 5;
  repeated RewardItem clear_rewards = 6;
  repeated LabyrinthRoom rooms = 7;
}

message LabyrinthRoom {
  int32 room_id = 1;
  string room_type = 2; // e.g. "battle", "treasure", "rest", "boss"
  bool is_visited = 3;
}
