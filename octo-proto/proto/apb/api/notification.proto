syntax = "proto3";

package apb.api;

// NotificationService handles player notifications and read state.
service NotificationService {
  rpc GetNotifications(GetNotificationsRequest) returns (GetNotificationsResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
}

// Request to fetch player notifications.
message GetNotificationsRequest {
  string uuid = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// Response with paginated notifications.
message GetNotificationsResponse {
  repeated NotificationData notifications = 1;
  int32 total_count = 2;
  int32 page = 3;
}

// Request to mark notifications as read.
message MarkReadRequest {
  string uuid = 1;
  repeated string notification_ids = 2;
}

// Response after marking notifications as read.
message MarkReadResponse {
  int32 marked_count = 1;
}

// Single notification entry.
message NotificationData {
  string notification_id = 1;
  string title = 2;
  string body = 3;
  string type = 4;
  bool read = 5;
  int64 created_time = 6;
  map<string, string> metadata = 7;
}
